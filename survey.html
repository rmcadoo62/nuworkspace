<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Customer Satisfaction Survey — NU Laboratories</title>
<script>
  // Legacy survey URL. Forward to the /portal/survey zone, preserving the token.
  // Self-contained on purpose — no external assets, so the existing
  // /survey.html Cloudflare Access bypass covers it as-is.
  (function () {
    var p = new URLSearchParams(window.location.search);
    var t = p.get('t') || p.get('token') || '';
    var dest = '/portal/survey/' + (t ? '?t=' + encodeURIComponent(t) : '');
    window.location.replace(dest);
  })();
</script>
</head>
<body>
  <noscript><a href="/portal/survey/">Continue to the survey</a></noscript>
</body>
</html>
